logging = false

[overlay]
anchor_margin = 10
width = 800
height = 100

[visualizer]
backend = "cava"
gpu = "enabled"
type = "bars"
framerate = 30

[bar]
points = 140
point_width = 12
point_gap = 4
corner_radius = 20

[wave]
points = 30
point_width = 12
point_gap = 20
thickness = 4

[daemon]
poll_interval_ms = 500
activity_threshold = 0.035
activate_delay_ms = 0
deactivate_delay_ms = 10
stop_on_silence = true
notify_on_error = true
notify_cooldown_seconds = 120
allowed_processes = ["spotify", "firefox"]
